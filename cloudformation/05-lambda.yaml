AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 5 - Lambda Functions: POST handler dan GET handler'

Parameters:
  ProjectPrefix:
    Type: String
    Default: myapp
    Description: Prefix used for resource naming and CloudFormation exports
  DBPassword:
    Type: String
    NoEcho: true

Resources:

  # ─────────────────────────────────────────────
  # IAM ROLE untuk Lambda
  # ─────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectPrefix}-LambdaPermissions'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-storage-${AWS::AccountId}-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-storage-${AWS::AccountId}-${AWS::Region}/*'
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectPrefix}/*'

  # ─────────────────────────────────────────────
  # LAMBDA FUNCTION — POST Handler
  # ─────────────────────────────────────────────
  LambdaPostFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectPrefix}-post-handler'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': json.dumps({'message': 'placeholder'})}
      Environment:
        Variables:
          DB_HOST: 
            Fn::ImportValue: !Sub '${ProjectPrefix}-DBEndpoint'
          DB_PORT: '5432'
          DB_NAME: myappdb
          DB_USER: myappuser
          DB_PASSWORD: !Ref DBPassword
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet1Id'
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${ProjectPrefix}-LambdaSGId'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-post-handler'

  # ─────────────────────────────────────────────
  # LAMBDA FUNCTION — GET Handler
  # ─────────────────────────────────────────────
  LambdaGetFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectPrefix}-get-handler'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': json.dumps({'data': []})}
      Environment:
        Variables:
          DB_HOST: 
            Fn::ImportValue: !Sub '${ProjectPrefix}-DBEndpoint'
          DB_PORT: '5432'
          DB_NAME: myappdb
          DB_USER: myappuser
          DB_PASSWORD: !Ref DBPassword
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet1Id'
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${ProjectPrefix}-LambdaSGId'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-get-handler'

  # ─────────────────────────────────────────────
  # CLOUDWATCH LOG GROUPS
  # ─────────────────────────────────────────────
  PostLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectPrefix}-post-handler'
      RetentionInDays: 14

  GetLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectPrefix}-get-handler'
      RetentionInDays: 14

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  PostLambdaArn:
    Description: ARN Lambda POST Handler
    Value: !GetAtt LambdaPostFunction.Arn
    Export:
      Name: !Sub '${ProjectPrefix}-PostLambdaArn'

  GetLambdaArn:
    Description: ARN Lambda GET Handler
    Value: !GetAtt LambdaGetFunction.Arn
    Export:
      Name: !Sub '${ProjectPrefix}-GetLambdaArn'

  PostLambdaName:
    Description: Nama Lambda POST
    Value: !Ref LambdaPostFunction
    Export:
      Name: !Sub '${ProjectPrefix}-PostLambdaName'

  GetLambdaName:
    Description: Nama Lambda GET
    Value: !Ref LambdaGetFunction
    Export:
      Name: !Sub '${ProjectPrefix}-GetLambdaName'
