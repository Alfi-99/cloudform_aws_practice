AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 2 - RDS PostgreSQL Free Tier (Isolated in Private Subnet)'

Parameters:
  ProjectPrefix:
    Type: String
    Default: myapp
    Description: Prefix used for resource naming and CloudFormation exports

  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for the PostgreSQL database

Resources:

  # ─────────────────────────────────────────────
  # SECURITY GROUPS
  # ─────────────────────────────────────────────

  # Security Group untuk Beanstalk (agar RDS bisa mengizinkan akses dari sini)
  BeanstalkSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Beanstalk Instances
      VpcId: 
        Fn::ImportValue: !Sub '${ProjectPrefix}-VpcId'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-beanstalk-sg'

  # Security Group untuk Lambda
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Lambda Functions
      VpcId: 
        Fn::ImportValue: !Sub '${ProjectPrefix}-VpcId'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-lambda-sg'

  # Security Group untuk RDS (hanya terima dari Beanstalk & Lambda)
  RDSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to RDS from Beanstalk and Lambda
      VpcId: 
        Fn::ImportValue: !Sub '${ProjectPrefix}-VpcId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref BeanstalkSG
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSG
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-rds-sg'

  # ─────────────────────────────────────────────
  # RDS DB SUBNET GROUP
  # ─────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for RDS Instance
      SubnetIds:
        - Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet2Id'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-db-subnet-group'

  # ─────────────────────────────────────────────
  # RDS POSTGRESQL INSTANCE
  # ─────────────────────────────────────────────
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectPrefix}-postgres'
      Engine: postgres
      EngineVersion: '16.13'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      DBName: myappdb
      MasterUsername: myappuser
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSG
      MultiAZ: false
      PubliclyAccessible: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-rds-postgres'

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  DBEndpoint:
    Description: Hostname database RDS
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub '${ProjectPrefix}-DBEndpoint'

  BeanstalkSGId:
    Description: Security Group ID untuk Beanstalk
    Value: !Ref BeanstalkSG
    Export:
      Name: !Sub '${ProjectPrefix}-BeanstalkSGId'

  LambdaSGId:
    Description: Security Group ID untuk Lambda
    Value: !Ref LambdaSG
    Export:
      Name: !Sub '${ProjectPrefix}-LambdaSGId'

  RDSSGId:
    Description: Security Group ID untuk RDS
    Value: !Ref RDSSG
    Export:
      Name: !Sub '${ProjectPrefix}-RDSSGId'
