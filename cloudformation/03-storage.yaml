AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 3 - Storage: S3 Bucket (App Storage) + EFS (Shared Filesystem)'

Parameters:
  ProjectPrefix:
    Type: String
    Default: myapp
    Description: Prefix used for resource naming and CloudFormation exports

Resources:

  # ─────────────────────────────────────────────
  # S3 BUCKET — Penyimpanan file aplikasi
  # ─────────────────────────────────────────────
  AppStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectPrefix}-storage-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: MoveOldFilesToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
            NoncurrentVersionTransitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
            NoncurrentVersionExpirationInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - POST
              - PUT
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-storage'

  # ─────────────────────────────────────────────
  # EFS — Shared Filesystem untuk Elastic Beanstalk
  # ─────────────────────────────────────────────
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EFS
      VpcId: 
        Fn::ImportValue: !Sub '${ProjectPrefix}-VpcId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16
          Description: NFS from Beanstalk instances
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-efs-sg'

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
        - TransitionToPrimaryStorageClass: AFTER_1_ACCESS
      FileSystemTags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-efs'

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: 
        Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet1Id'
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: 
        Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet2Id'
      SecurityGroups:
        - !Ref EFSSecurityGroup

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  AppStorageBucketName:
    Description: Nama S3 Bucket untuk storage aplikasi
    Value: !Ref AppStorageBucket
    Export:
      Name: !Sub '${ProjectPrefix}-AppStorageBucketName'

  AppStorageBucketArn:
    Description: ARN S3 Bucket
    Value: !GetAtt AppStorageBucket.Arn
    Export:
      Name: !Sub '${ProjectPrefix}-AppStorageBucketArn'

  EFSFileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
    Export:
      Name: !Sub '${ProjectPrefix}-EFSFileSystemId'

  EFSDnsName:
    Description: EFS DNS Name untuk mount
    Value: !Sub '${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${ProjectPrefix}-EFSDnsName'
