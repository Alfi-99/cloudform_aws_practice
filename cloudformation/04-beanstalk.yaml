AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 4 - Elastic Beanstalk Node.js with Application Load Balancer & Auto Scaling'

Parameters:
  ProjectPrefix:
    Type: String
    Default: myapp
    Description: Prefix used for resource naming and CloudFormation exports

  DBPassword:
    Type: String
    NoEcho: true

Resources:

  # ─────────────────────────────────────────────
  # IAM ROLES
  # ─────────────────────────────────────────────
  BeanstalkServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-beanstalk-service-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: elasticbeanstalk.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSElasticBeanstalkEnhancedHealth
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkManagedUpdatesCustomerRolePolicy

  BeanstalkEC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-beanstalk-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkMulticontainerDocker
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: !Sub '${ProjectPrefix}-BeanstalkS3Access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-storage-${AWS::AccountId}-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-storage-${AWS::AccountId}-${AWS::Region}/*'

  BeanstalkInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ProjectPrefix}-beanstalk-instance-profile'
      Roles:
        - !Ref BeanstalkEC2Role

  # ─────────────────────────────────────────────
  # ELASTIC BEANSTALK APPLICATION
  # ─────────────────────────────────────────────
  BeanstalkApp:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: !Sub '${ProjectPrefix}-backend'
      Description: !Sub '${ProjectPrefix} Node.js Express Backend — Dashboard API'
      ResourceLifecycleConfig:
        ServiceRole: !GetAtt BeanstalkServiceRole.Arn
        VersionLifecycleConfig:
          MaxCountRule:
            Enabled: true
            MaxCount: 5
            DeleteSourceFromS3: true

  # ─────────────────────────────────────────────
  # ELASTIC BEANSTALK ENVIRONMENT
  # ─────────────────────────────────────────────
  BeanstalkEnvironment:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      ApplicationName: !Ref BeanstalkApp
      EnvironmentName: !Sub '${ProjectPrefix}-prod-env'
      Description: !Sub '${ProjectPrefix} Production Environment'
      SolutionStackName: '64bit Amazon Linux 2023 v6.10.1 running Node.js 20'
      OptionSettings:

        # ── VPC & Subnet ──────────────────────────
        - Namespace: aws:ec2:vpc
          OptionName: VPCId
          Value: 
            Fn::ImportValue: !Sub '${ProjectPrefix}-VpcId'

        - Namespace: aws:ec2:vpc
          OptionName: Subnets
          Value: !Join
            - ','
            - - Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet1Id'
              - Fn::ImportValue: !Sub '${ProjectPrefix}-PrivateSubnet2Id'

        - Namespace: aws:ec2:vpc
          OptionName: ELBSubnets
          Value: !Join
            - ','
            - - Fn::ImportValue: !Sub '${ProjectPrefix}-PublicSubnet1Id'
              - Fn::ImportValue: !Sub '${ProjectPrefix}-PublicSubnet2Id'

        - Namespace: aws:ec2:vpc
          OptionName: ELBScheme
          Value: public

        # ── Instance Type ─────────────────────────
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: InstanceType
          Value: t3.micro

        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref BeanstalkInstanceProfile

        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: SecurityGroups
          Value: 
            Fn::ImportValue: !Sub '${ProjectPrefix}-BeanstalkSGId'

        # ── Auto Scaling ──────────────────────────
        - Namespace: aws:autoscaling:asg
          OptionName: MinSize
          Value: '1'
        - Namespace: aws:autoscaling:asg
          OptionName: MaxSize
          Value: '4'

        # ── Health Check ──────────────────────────
        - Namespace: aws:elasticbeanstalk:application
          OptionName: Application Healthcheck URL
          Value: /health

        - Namespace: aws:elasticbeanstalk:environment:process:default
          OptionName: HealthCheckPath
          Value: /health
        - Namespace: aws:elasticbeanstalk:environment:process:default
          OptionName: Port
          Value: '8080'
        - Namespace: aws:elasticbeanstalk:environment:process:default
          OptionName: Protocol
          Value: HTTP

        # ── Environment Variables ─────────────────
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: NODE_ENV
          Value: production
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: PORT
          Value: '8080'
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_HOST
          Value: 
            Fn::ImportValue: !Sub '${ProjectPrefix}-DBEndpoint'
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_PORT
          Value: '5432'
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_NAME
          Value: myappdb
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_USER
          Value: myappuser
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_PASSWORD
          Value: !Ref DBPassword
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: S3_BUCKET
          Value: !Sub '${ProjectPrefix}-storage-${AWS::AccountId}-${AWS::Region}'

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  BeanstalkURL:
    Description: URL Elastic Beanstalk Environment
    Value: !Sub 'http://${BeanstalkEnvironment.EndpointURL}'
    Export:
      Name: !Sub '${ProjectPrefix}-BeanstalkURL'

  BeanstalkAppName:
    Description: Nama Aplikasi Beanstalk
    Value: !Ref BeanstalkApp
    Export:
      Name: !Sub '${ProjectPrefix}-BeanstalkAppName'

  BeanstalkEnvName:
    Description: Nama Environment Beanstalk
    Value: !Ref BeanstalkEnvironment
    Export:
      Name: !Sub '${ProjectPrefix}-BeanstalkEnvName'
