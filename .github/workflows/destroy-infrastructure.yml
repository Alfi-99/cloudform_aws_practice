name: '🗑️ Destroy Infrastructure (CloudFormation Delete)'

on:
  # Harus dijalankan MANUAL — tidak boleh otomatis!
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Ketik DESTROY untuk konfirmasi penghapusan semua resource'
        required: true
        type: string
      environment:
        description: 'Environment yang akan dihapus'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: ap-southeast-1
  PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX || 'myapp' }}

jobs:
  # ─────────────────────────────────────────────
  # SAFETY CHECK — Pastikan user benar-benar yakin
  # ─────────────────────────────────────────────
  safety-check:
    name: 🔒 Safety Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ DIBATALKAN: Konfirmasi salah!"
            echo "   Anda memasukkan: '${{ github.event.inputs.confirm }}'"
            echo "   Harus mengetik: DESTROY"
            exit 1
          fi
          echo "✅ Konfirmasi diterima — melanjutkan penghapusan..."
          echo "⚠️  Project Prefix: ${{ env.PROJECT_PREFIX }}"
          echo "⚠️  Environment: ${{ github.event.inputs.environment }}"

      - name: Print Warning
        run: |
          echo "================================================"
          echo "   ⚠️  PERINGATAN: SEMUA RESOURCE AKAN DIHAPUS"
          echo "================================================"
          echo "Stack yang akan dihapus (Prefix: ${{ env.PROJECT_PREFIX }}):"
          echo "  6. ${{ env.PROJECT_PREFIX }}-apigateway"
          echo "  5. ${{ env.PROJECT_PREFIX }}-lambda"
          echo "  4. ${{ env.PROJECT_PREFIX }}-beanstalk"
          echo "  3. ${{ env.PROJECT_PREFIX }}-storage"
          echo "  2. ${{ env.PROJECT_PREFIX }}-rds    ← RDS akan di-snapshot dulu"
          echo "  1. ${{ env.PROJECT_PREFIX }}-vpc"
          echo ""
          echo "⏱️  Proses ini membutuhkan ~10-20 menit"
          echo "================================================"

  # ─────────────────────────────────────────────
  # DESTROY — Hapus stack dari atas ke bawah
  # ─────────────────────────────────────────────
  destroy:
    name: 🗑️ Delete All Stacks
    runs-on: ubuntu-latest
    needs: safety-check
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Stack Status Before Delete
        run: |
          echo "=== Status Stack Sebelum Dihapus (${{ env.PROJECT_PREFIX }}) ==="
          for stack in apigateway lambda beanstalk storage rds vpc; do
            FULL_NAME="${{ env.PROJECT_PREFIX }}-$stack"
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name $FULL_NAME \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "NOT_FOUND")
            echo "$FULL_NAME → $STATUS"
          done

      # ── Step 1: Hapus API Gateway ─────────────────────────────────
      - name: Delete Stack 6 - API Gateway
        run: |
          STACK="${{ env.PROJECT_PREFIX }}-apigateway"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 2: Hapus Lambda ──────────────────────────────────────
      - name: Delete Stack 5 - Lambda
        run: |
          STACK="${{ env.PROJECT_PREFIX }}-lambda"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 3: Hapus Elastic Beanstalk ──────────────────────────
      - name: Delete Stack 4 - Elastic Beanstalk
        run: |
          STACK="${{ env.PROJECT_PREFIX }}-beanstalk"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK (termasuk EC2, ALB, ASG)..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 4: Hapus Storage (S3 + EFS) ─────────────────────────
      - name: Delete Stack 3 - Storage
        run: |
          STACK="${{ env.PROJECT_PREFIX }}-storage"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🧹 Mengosongkan S3 bucket dulu..."
            BUCKET="${{ env.PROJECT_PREFIX }}-storage-${{ secrets.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}"
            
            # Hapus semua versi object
            aws s3api list-object-versions \
              --bucket $BUCKET \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              --output json 2>/dev/null | \
            jq -r '.Objects // [] | .[] | "--delete-object Key=" + .Key + ",VersionId=" + .VersionId' | \
            xargs -r aws s3api delete-objects --bucket $BUCKET --delete "$(cat -)" 2>/dev/null || true
            
            aws s3 rm s3://$BUCKET --recursive 2>/dev/null || true
            
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 5: Hapus RDS ─────────────────────────────────────────
      - name: Delete Stack 2 - RDS
        run: |
          STACK="${{ env.PROJECT_PREFIX }}-rds"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🔓 Menonaktifkan RDS Deletion Protection..."
            aws rds modify-db-instance \
              --db-instance-identifier ${{ env.PROJECT_PREFIX }}-postgres \
              --no-deletion-protection \
              --apply-immediately \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
            
            sleep 30
            
            echo "🗑️  Menghapus $STACK (RDS akan di-snapshot dulu)..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 6: Hapus VPC ─────────────────────────────────────────
      - name: Delete Stack 1 - VPC
        run: |
          STACK="${{ env.PROJECT_PREFIX }}-vpc"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 7: Hapus Artifact Bucket ─────────────────────────────
      - name: Delete Artifact S3 Bucket
        run: |
          BUCKET="${{ env.PROJECT_PREFIX }}-artifacts-${{ secrets.AWS_ACCOUNT_ID }}"
          
          if aws s3 ls "s3://${BUCKET}" 2>/dev/null; then
            echo "🧹 Mengosongkan dan menghapus artifact bucket..."
            aws s3 rm s3://${BUCKET} --recursive 2>/dev/null || true
            aws s3api delete-bucket --bucket ${BUCKET} --region ${{ env.AWS_REGION }} 2>/dev/null || true
            echo "✅ Artifact bucket dihapus"
          else
            echo "⏭️  Artifact bucket tidak ditemukan"
          fi

      # ── Final Report ───────────────────────────────────────────────
      - name: Final Status Report
        run: |
          echo "================================================"
          echo "          ✅ DESTROY SELESAI                   "
          echo "================================================"
          echo "Verifikasi status semua stack (Prefix: ${{ env.PROJECT_PREFIX }}):"
          for stack in apigateway lambda beanstalk storage rds vpc; do
            FULL_NAME="${{ env.PROJECT_PREFIX }}-$stack"
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name $FULL_NAME \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "✅ DELETED")
            echo "$FULL_NAME → $STATUS"
          done
          echo "================================================"
